<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>

  <!-- Main CSS file -->
  <link rel="stylesheet" href="style.css">

  <!-- Main JS file -->
   <script src="main.js" defer></script>

  <!-- Google Fonts Overpass font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="main.css">

</head>
<body class="bgcl-vdb min-h-screen flex justify-center items-center">
  <!-- Rating state start -->
  <form class="p-5 w-80 text-white rounded-xl bgcl-db">
    <div class="text">
      <img class="block" src="./images/icon-star.svg" alt="">
      <h1 class="question">How did we do?</h1>
      <p>Please let us know how we did with your support request. All feedback is appreciated 
      to help us improve our offering!</p>
    </div>

    <div class="rating ">
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
      <span>5</span>
    </div>

    <button class="bg-orange-500 rounded-3xl w-full p-4" type="submit">Submit</button>
  </form>

  <!-- Rating state end -->

  <!-- Thank you state start -->

  <!-- You selected <!-|- Add rating here -|-> out of 5 -->

  <!-- Thank you!

  We appreciate you taking the time to give a rating. If you ever need more support, 
  don’t hesitate to get in touch! -->

  <!-- Thank you state end -->
</body>
</html>
